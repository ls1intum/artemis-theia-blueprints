name: Build and Push Theia Images (ARC runners)

# Builds using stateless ARC self-hosted runners with cluster-internal caching:
#   - Docker Hub registry mirror
#   - BuildKit layer cache stored in GHCR
#
# Faster than the GitHub-hosted variant but requires the ARC infrastructure
# and the cluster-internal registry mirror to be healthy.

on:
  workflow_call:
  workflow_dispatch:

jobs:
  determine-tag:
    runs-on: arc-runner-set-eduidec
    outputs:
      base_tag: ${{ steps.set-tag.outputs.base_tag }}
      sha_tag: ${{ steps.set-tag.outputs.sha_tag }}
      cache_tag: ${{ steps.set-tag.outputs.cache_tag }}
    steps:
      - name: Checkout for SHA access
        uses: actions/checkout@v4

      - name: Set tags
        id: set-tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
            CACHE_TAG="build-cache-pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            BASE_TAG="${SAFE_REF_NAME}"
            CACHE_TAG="build-cache-${SAFE_REF_NAME}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BASE_TAG="latest"
            CACHE_TAG="build-cache"
          else
            BASE_TAG="${SAFE_REF_NAME}"
            CACHE_TAG="build-cache"
          fi

          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BASE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_tag=${CACHE_TAG}" >> "$GITHUB_OUTPUT"

  build-and-push-base:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: images/base-ide/BaseDockerfile
      image-name: eduide/eduide/base
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      network: "host"
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "arc-runner-set-eduidec"
      runner-arm64: "arc-runner-set-eduidec-arm64"
      registry-mirror: "http://131.159.88.30:30081"
      cache-from: |
        type=registry,ref=ghcr.io/eduide/eduide/base:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/eduide/eduide/base:build-cache
      cache-to: "type=registry,ref=ghcr.io/eduide/eduide/base:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets: inherit

  build-and-push:
    needs:
      - determine-tag
      - build-and-push-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker-file: images/c/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/c
          - docker-file: images/haskell/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/haskell
          - docker-file: images/java-17/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/java-17
          - docker-file: images/javascript/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/javascript
          - docker-file: images/ocaml/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/ocaml
          - docker-file: images/python/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/python
          - docker-file: images/rust/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/rust
          - docker-file: images/languageserver/java/Dockerfile
            docker-context: "."
            image-name: eduide/eduide/langserver-java
          - docker-file: images/languageserver/rust/Dockerfile
            docker-context: "."
            image-name: eduide/eduide/langserver-rust
          - docker-file: images/theia-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/theia-no-ls
          - docker-file: images/java-17-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/java-17-no-ls
          - docker-file: images/rust-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/rust-no-ls

    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/arc-runner-support
    with:
      docker-file: ${{ matrix.docker-file }}
      image-name: ${{ matrix.image-name }}
      docker-context: ${{ matrix.docker-context }}
      build-args: |
        BASE_IDE_TAG=${{ needs.determine-tag.outputs.base_tag }}
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      network: "host"
      build-amd64: true
      build-arm64: ${{ github.event_name != 'pull_request' }}
      runner-amd64: "arc-runner-set-eduidec"
      runner-arm64: "arc-runner-set-eduidec-arm64"
      registry-mirror: "http://131.159.88.30:30081"
      cache-from: |
        type=registry,ref=ghcr.io/${{ matrix.image-name }}:${{ needs.determine-tag.outputs.cache_tag }}
        type=registry,ref=ghcr.io/${{ matrix.image-name }}:build-cache
      cache-to: "type=registry,ref=ghcr.io/${{ matrix.image-name }}:${{ needs.determine-tag.outputs.cache_tag }},mode=max"
    secrets: inherit
