name: Build and Push Theia Images

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  release:
    types:
      - published
      - prereleased

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ARC self-hosted runners (fast, with Verdaccio/registry/proxy caching)
  # Disabled until ARC is available in the new repo
  # arc:
  #   uses: ./.github/workflows/arc-runner.yml
  #   secrets: inherit

  # Stateful BuildKit runners (experimental, AMD64 only)
  buildkit-exp:
    uses: ./.github/workflows/buildkit-runner.yml
    secrets: inherit

  # GitHub-hosted runners (slower, no cluster dependencies, reliable fallback)
  github-hosted:
    uses: ./.github/workflows/github-runner.yml
    secrets: inherit
