name: Build and Push Theia Images (Stateful BuildKit)

# Builds using stateful BuildKit workers on theia-prod:
#   - Remote BuildKit daemons with persistent 100Gi cache volumes
#   - Consistent hash routing (repo + dockerfile → same worker = warm cache)
#   - AMD64 only (experimental)
#
# Runner: arc-runner-set-buildkit-exp (opt-in, min 0 / max 10)
# BuildKit: 5 privileged daemons in buildkit-exp namespace

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""
        type: string
  workflow_dispatch:

jobs:
  determine-tag:
    runs-on: arc-runner-set-buildkit-exp
    outputs:
      base_tag: ${{ steps.set-tag.outputs.base_tag }}
      sha_tag: ${{ steps.set-tag.outputs.sha_tag }}
    steps:
      - name: Checkout for SHA access
        uses: actions/checkout@v4

      - name: Set tags
        id: set-tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')

          OVERRIDE="${{ inputs.image_tag }}"
          if [[ -n "$OVERRIDE" ]]; then
            BASE_TAG="$OVERRIDE"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_TAG="pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            BASE_TAG="${SAFE_REF_NAME}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BASE_TAG="latest"
          else
            BASE_TAG="${SAFE_REF_NAME}"
          fi

          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BASE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build-and-push-base:
    needs: determine-tag
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/buildkit-remote-driver
    with:
      docker-file: images/base-ide/BaseDockerfile
      image-name: eduide/eduide/base
      docker-context: .
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      network: "host"
      build-amd64: true
      build-arm64: false
      runner-amd64: arc-runner-set-buildkit-exp
      runner-merge: arc-runner-set-buildkit-exp
    secrets: inherit

  build-and-push:
    needs:
      - determine-tag
      - build-and-push-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker-file: images/c/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/c
          - docker-file: images/haskell/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/haskell
          - docker-file: images/java-17/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/java-17
          - docker-file: images/javascript/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/javascript
          - docker-file: images/ocaml/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/ocaml
          - docker-file: images/python/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/python
          - docker-file: images/rust/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/rust
          - docker-file: images/languageserver/java/Dockerfile
            docker-context: "."
            image-name: eduide/eduide/langserver-java
          - docker-file: images/languageserver/rust/Dockerfile
            docker-context: "."
            image-name: eduide/eduide/langserver-rust
          - docker-file: images/theia-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/theia-no-ls
          - docker-file: images/java-17-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/java-17-no-ls
          - docker-file: images/rust-no-ls/ToolDockerfile
            docker-context: "."
            image-name: eduide/eduide/rust-no-ls

    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@feature/buildkit-remote-driver
    with:
      docker-file: ${{ matrix.docker-file }}
      image-name: ${{ matrix.image-name }}
      docker-context: ${{ matrix.docker-context }}
      build-args: |
        BASE_IDE_TAG=${{ needs.determine-tag.outputs.base_tag }}
      tags: |
        ${{ needs.determine-tag.outputs.base_tag }}
        ${{ needs.determine-tag.outputs.sha_tag }}
      network: "host"
      build-amd64: true
      build-arm64: false
      runner-amd64: arc-runner-set-buildkit-exp
      runner-merge: arc-runner-set-buildkit-exp
    secrets: inherit
