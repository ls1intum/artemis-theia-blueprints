# =============================================================================
# theia-ls-setup/docker-compose-java.yml
# =============================================================================
# Purpose:
#   Runs the minimal Theia IDE (no Java tooling) together with an external
#   Java language server. Use this when you want the smallest possible IDE
#   image and supply Java LSP support entirely through the external server.
#
# Images used:
#   - theia:     ghcr.io/EduIDE/EduIDE/theia-no-ls  — bare Theia IDE, no language tools
#   - java-ls:   ghcr.io/EduIDE/EduIDE/langserver-java — Standalone Java language server
#
# How to run:
#   docker compose -f theia-ls-setup/docker-compose-java.yml up
#
# Then open http://localhost:3000 in your browser.
#
# Difference to docker-compose-java-only.yml:
#   This file uses the minimal theia-no-ls image (no JDK/Maven inside the IDE).
#   docker-compose-java-only.yml uses java-17-no-ls which bundles Java tooling.
# =============================================================================

services:
  theia:
    image: ghcr.io/EduIDE/EduIDE/theia-no-ls:latest
    container_name: theia-ide
    ports:
      - "3000:3000"
    volumes:
      - project-data:/home/project
    networks:
      - app-net
    environment:
      # Tell the Theia LSP connector where to reach the Java language server
      - LS_JAVA_HOST=java-language-server
      - LS_JAVA_PORT=5000
    depends_on:
      - java-ls

  java-ls:
    image: ghcr.io/EduIDE/EduIDE/langserver-java:latest
    container_name: java-language-server
    environment:
      - LS_PORT=5000
      - WORKSPACE_PATH=/home/project
    volumes:
      # Share the project volume so the LS can read/index workspace files
      - project-data:/home/project
    networks:
      - app-net

volumes:
  # Persistent workspace so project files survive container restarts
  project-data:

networks:
  app-net:
    driver: bridge
