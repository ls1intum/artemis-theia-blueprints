# =============================================================================
# theia-ls-setup/docker-compose-rust.yml
# =============================================================================
# Purpose:
#   Runs the minimal Theia IDE (no Rust tooling) together with an external
#   Rust language server. Use this when you want the smallest possible IDE
#   image and supply Rust LSP support entirely through the external server.
#
# Images used:
#   - theia:    ghcr.io/EduIDE/EduIDE/theia-no-ls      — bare Theia IDE, no language tools
#   - rust-ls:  ghcr.io/EduIDE/EduIDE/langserver-rust  — Standalone Rust language server
#
# How to run:
#   docker compose -f theia-ls-setup/docker-compose-rust.yml up
#
# Then open http://localhost:3000 in your browser.
#
# Difference to docker-compose-rust-only.yml:
#   This file uses the minimal theia-no-ls image (no rustc/cargo inside the IDE).
#   docker-compose-rust-only.yml uses rust-no-ls which bundles Rust tooling.
# =============================================================================

services:
  theia:
    image: ghcr.io/EduIDE/EduIDE/theia-no-ls:latest
    container_name: theia-ide
    ports:
      - "3000:3000"
    volumes:
      - project-data:/home/project
    networks:
      - app-net
    environment:
      # Tell the Theia LSP connector where to reach the Rust language server
      - LS_RUST_HOST=rust-language-server
      - LS_RUST_PORT=5000
    depends_on:
      - rust-ls

  rust-ls:
    image: ghcr.io/EduIDE/EduIDE/langserver-rust:latest
    container_name: rust-language-server
    environment:
      - LS_PORT=5000
      - WORKSPACE_PATH=/home/project
    volumes:
      # Share the project volume so the LS can read/index workspace files
      - project-data:/home/project
    networks:
      - app-net

volumes:
  # Persistent workspace so project files survive container restarts
  project-data:

networks:
  app-net:
    driver: bridge
