# =============================================================================
# theia-ls-setup/docker-compose-java-only.yml
# =============================================================================
# Purpose:
#   Runs a Java IDE environment with a SEPARATE external Java language server.
#   Use this when you want the Java-specific IDE image (java-17-no-ls) that
#   ships Java tooling (JDK, Maven) but delegates LSP requests to an external
#   process over TCP.
#
# Images used:
#   - theia:     ghcr.io/eduide/eduide/java-17-no-ls  — Java IDE without embedded LS
#   - java-ls:   ghcr.io/eduide/eduide/langserver-java — Standalone Java language server
#
# How to run:
#   docker compose -f theia-ls-setup/docker-compose-java-only.yml up
#
# Then open http://localhost:3000 in your browser.
#
# Difference to docker-compose-java.yml:
#   This file uses the java-17-no-ls image which includes Java tooling (JDK/Maven).
#   docker-compose-java.yml uses the minimal theia-no-ls base image without Java tools.
# =============================================================================

services:
  theia:
    image: ghcr.io/eduide/eduide/java-17-no-ls:latest
    container_name: theia-java-ide
    ports:
      - "3000:3000"
    volumes:
      - project-data:/home/project
    networks:
      - app-net
    environment:
      # Tell the Theia LSP connector where to reach the Java language server
      - LS_JAVA_HOST=java-language-server
      - LS_JAVA_PORT=5000
    depends_on:
      - java-ls

  java-ls:
    image: ghcr.io/eduide/eduide/langserver-java:latest
    container_name: java-language-server
    environment:
      - LS_PORT=5000
      - WORKSPACE_PATH=/home/project
    volumes:
      # Share the project volume so the LS can read/index workspace files
      - project-data:/home/project
    networks:
      - app-net

volumes:
  # Persistent workspace so project files survive container restarts
  project-data:

networks:
  app-net:
    driver: bridge
