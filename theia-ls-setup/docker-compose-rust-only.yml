# =============================================================================
# theia-ls-setup/docker-compose-rust-only.yml
# =============================================================================
# Purpose:
#   Runs a Rust IDE environment with a SEPARATE external Rust language server.
#   Use this when you want the Rust-specific IDE image (rust-no-ls) that
#   ships Rust tooling (rustc, cargo) but delegates LSP requests to an external
#   process over TCP.
#
# Images used:
#   - theia:    ghcr.io/EduIDE/EduIDE/rust-no-ls       — Rust IDE without embedded LS
#   - rust-ls:  ghcr.io/EduIDE/EduIDE/langserver-rust  — Standalone Rust language server
#
# How to run:
#   docker compose -f theia-ls-setup/docker-compose-rust-only.yml up
#
# Then open http://localhost:3000 in your browser.
#
# Difference to docker-compose-rust.yml:
#   This file uses the rust-no-ls image which includes Rust tooling (rustc/cargo).
#   docker-compose-rust.yml uses the minimal theia-no-ls base image without Rust tools.
# =============================================================================

services:
  theia:
    image: ghcr.io/EduIDE/EduIDE/rust-no-ls:latest
    container_name: theia-rust-ide
    ports:
      - "3000:3000"
    volumes:
      - project-data:/home/project
    networks:
      - app-net
    environment:
      # Tell the Theia LSP connector where to reach the Rust language server
      - LS_RUST_HOST=rust-language-server
      - LS_RUST_PORT=5000
    depends_on:
      - rust-ls

  rust-ls:
    image: ghcr.io/EduIDE/EduIDE/langserver-rust:latest
    container_name: rust-language-server
    environment:
      - LS_PORT=5000
      - WORKSPACE_PATH=/home/project
    volumes:
      # Share the project volume so the LS can read/index workspace files
      - project-data:/home/project
    networks:
      - app-net

volumes:
  # Persistent workspace so project files survive container restarts
  project-data:

networks:
  app-net:
    driver: bridge
